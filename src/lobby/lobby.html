<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MTG Duel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      width: 420px;
      padding: 40px;
      background: #16213e;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 8px;
      color: #fff;
    }
    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 32px;
      font-size: 14px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #0f3460;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #555; }
    .field { margin-bottom: 20px; }
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: #555;
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #333;
    }
    .divider span { padding: 0 12px; }
    .actions {
      display: flex;
      gap: 12px;
    }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-create { background: #3b82f6; color: #fff; }
    .btn-join { background: #10b981; color: #fff; }
    .room-code-display {
      display: none;
      text-align: center;
      margin-top: 24px;
      padding: 20px;
      background: #0f3460;
      border-radius: 8px;
    }
    .room-code-display .code {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: 8px;
      color: #3b82f6;
      font-family: monospace;
    }
    .room-code-display .hint {
      color: #888;
      font-size: 13px;
      margin-top: 8px;
    }
    .status {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #888;
      min-height: 20px;
    }
    .status.error { color: #ef4444; }
    .status.success { color: #10b981; }
    .join-section {
      display: none;
      margin-top: 24px;
    }
    .join-section .field { margin-bottom: 12px; }
    .join-section button { width: 100%; }
  </style>
</head>
<body>
  <div class="container">
    <h1>MTG Duel</h1>
    <p class="subtitle">Networked Moxfield Playtester</p>

    <div class="field">
      <label>Your Deck (URL or ID)</label>
      <input type="text" id="deckInput" placeholder="https://moxfield.com/decks/... or deck ID">
    </div>

    <div class="actions" id="mainActions">
      <button class="btn-create" id="createBtn">Create Room</button>
      <button class="btn-join" id="showJoinBtn">Join Room</button>
    </div>

    <div class="room-code-display" id="roomCodeDisplay">
      <div class="hint">Share this code with your opponent</div>
      <div class="code" id="roomCode">----</div>
      <div class="hint">Waiting for opponent to join...</div>
    </div>

    <div class="join-section" id="joinSection">
      <div class="field">
        <label>Room Code</label>
        <input type="text" id="codeInput" placeholder="ABCD" maxlength="4" style="text-transform: uppercase; text-align: center; font-size: 24px; letter-spacing: 4px;">
      </div>
      <button class="btn-join" id="joinBtn">Join</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    const bridge = window.lobbyBridge;
    const DECK_STORAGE_KEY = 'mtg_duel_last_deck';

    const deckInput = document.getElementById('deckInput');
    const createBtn = document.getElementById('createBtn');
    const showJoinBtn = document.getElementById('showJoinBtn');
    const joinBtn = document.getElementById('joinBtn');
    const codeInput = document.getElementById('codeInput');
    const roomCodeDisplay = document.getElementById('roomCodeDisplay');
    const roomCode = document.getElementById('roomCode');
    const joinSection = document.getElementById('joinSection');
    const mainActions = document.getElementById('mainActions');
    const status = document.getElementById('status');

    const savedDeck = localStorage.getItem(DECK_STORAGE_KEY);
    if (savedDeck) deckInput.value = savedDeck;

    function getDeckUrl() {
      const val = deckInput.value.trim();
      if (!val) return null;
      localStorage.setItem(DECK_STORAGE_KEY, val);
      if (val.startsWith('http')) return val;
      return `https://www.moxfield.com/decks/${val}/goldfish`;
    }

    function setStatus(msg, type) {
      status.textContent = msg;
      status.className = 'status' + (type ? ' ' + type : '');
    }

    function disableAll() {
      createBtn.disabled = true;
      showJoinBtn.disabled = true;
      joinBtn.disabled = true;
      deckInput.disabled = true;
      codeInput.disabled = true;
    }

    createBtn.addEventListener('click', () => {
      const deck = getDeckUrl();
      if (!deck) { setStatus('Enter your deck URL or ID first', 'error'); return; }
      disableAll();
      setStatus('Connecting...');
      bridge.createRoom(deck);
    });

    showJoinBtn.addEventListener('click', () => {
      mainActions.style.display = 'none';
      joinSection.style.display = 'block';
      codeInput.focus();
    });

    joinBtn.addEventListener('click', () => {
      const deck = getDeckUrl();
      if (!deck) { setStatus('Enter your deck URL or ID first', 'error'); return; }
      const code = codeInput.value.trim().toUpperCase();
      if (code.length !== 4) { setStatus('Enter a 4-character room code', 'error'); return; }
      disableAll();
      setStatus('Joining room...');
      bridge.joinRoom(code, deck);
    });

    codeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') joinBtn.click();
    });

    bridge.onStatus((data) => {
      if (data.type === 'room-created') {
        roomCode.textContent = data.code;
        roomCodeDisplay.style.display = 'block';
        mainActions.style.display = 'none';
        setStatus('Waiting for opponent...', '');
      } else if (data.type === 'game-start') {
        setStatus('Opponent connected! Loading game...', 'success');
      } else if (data.type === 'error') {
        setStatus(data.message || 'Connection error', 'error');
        createBtn.disabled = false;
        showJoinBtn.disabled = false;
        joinBtn.disabled = false;
        deckInput.disabled = false;
        codeInput.disabled = false;
      }
    });
  </script>
</body>
</html>
