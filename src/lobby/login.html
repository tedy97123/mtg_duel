<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MTG Duel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0a0f;
  --surface:  #111118;
  --border:   #1e1e2e;
  --accent:   #e84545;
  --accent2:  #ff6b35;
  --text:     #e8e8f0;
  --muted:    #5a5a7a;
  --green:    #22c55e;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  color: var(--text);
}

/* Ambient background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 50%, rgba(232,69,69,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 30%, rgba(255,107,53,0.05) 0%, transparent 70%);
  pointer-events: none;
}

/* Grid overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

.container {
  position: relative;
  width: 460px;
  z-index: 1;
  animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:none; }
}

/* Logo area */
.logo-area {
  text-align: center;
  margin-bottom: 48px;
}

.logo-icon {
  width: 56px;
  height: 56px;
  margin: 0 auto 20px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  box-shadow: 0 0 40px rgba(232,69,69,0.3);
}

.logo-title {
  font-family: 'Syne', sans-serif;
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -1px;
  color: var(--text);
  line-height: 1;
}

.logo-sub {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 8px;
}

/* Card */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.03) inset,
    0 40px 80px rgba(0,0,0,0.5);
}

/* Features */
.features {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 32px;
}

.feature {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: var(--muted);
  transition: border-color 0.2s;
}

.feature:hover { border-color: rgba(232,69,69,0.3); color: var(--text); }

.feature-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

/* Divider */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.divider-line { flex:1; height:1px; background:var(--border); }
.divider-text { font-size:10px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }

/* Buttons */
.btn-discord {
  width: 100%;
  padding: 16px;
  background: #5865F2;
  border: none;
  border-radius: 12px;
  color: #fff;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 1px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.2s;
  margin-bottom: 12px;
  box-shadow: 0 4px 20px rgba(88,101,242,0.3);
}

.btn-discord:hover {
  background: #4752c4;
  transform: translateY(-1px);
  box-shadow: 0 8px 30px rgba(88,101,242,0.4);
}

.btn-discord:active { transform: none; }
.btn-discord:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

.btn-skip {
  width: 100%;
  padding: 14px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-skip:hover {
  border-color: rgba(255,255,255,0.2);
  color: var(--text);
}

/* Status */
.status {
  text-align: center;
  margin-top: 16px;
  font-size: 11px;
  color: var(--muted);
  min-height: 16px;
  letter-spacing: 1px;
}

.status.loading { animation: pulse 1.5s ease-in-out infinite; }
.status.error   { color: var(--accent); }
.status.success { color: var(--green); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>
<div class="container">
  <div class="logo-area">
    <div class="logo-icon">⚔</div>
    <div class="logo-title">MTG DUEL</div>
    <div class="logo-sub">Networked Playtester</div>
  </div>

  <div class="card">
    <div class="features">
      <div class="feature"><div class="feature-dot"></div>Save your decks</div>
      <div class="feature"><div class="feature-dot"></div>Track matches</div>
      <div class="feature"><div class="feature-dot"></div>Leaderboards</div>
      <div class="feature"><div class="feature-dot"></div>Auto deck fill</div>
    </div>

    <button class="btn-discord" id="loginBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
      </svg>
      Login with Discord
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">or</div>
      <div class="divider-line"></div>
    </div>

    <button class="btn-skip" id="skipBtn">Continue without login</button>

    <div class="status" id="status"></div>
  </div>
</div>

<script>
const bridge = window.loginBridge;

document.getElementById('loginBtn').addEventListener('click', () => {
  document.getElementById('status').textContent = 'Opening Discord...';
  document.getElementById('status').className = 'status loading';
  document.getElementById('loginBtn').disabled = true;
  bridge.loginWithDiscord();
});

document.getElementById('skipBtn').addEventListener('click', () => bridge.skipLogin());

bridge.onAuthResult((result) => {
  if (result.success) {
    document.getElementById('status').textContent = `Welcome, ${result.username}!`;
    document.getElementById('status').className = 'status success';
  } else {
    document.getElementById('status').textContent = result.error || 'Authentication failed';
    document.getElementById('status').className = 'status error';
    document.getElementById('loginBtn').disabled = false;
  }
});
</script>
</body>
</html>
