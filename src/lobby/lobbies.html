<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MTG Duel — Open Lobbies</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0a0a0f;
  --surface: #111118;
  --border:  #1e1e2e;
  --accent:  #e84545;
  --accent2: #ff6b35;
  --text:    #e8e8f0;
  --muted:   #5a5a7a;
  --green:   #22c55e;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-y: auto;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 50% 40% at 80% 10%, rgba(232,69,69,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.layout {
  position: relative;
  z-index: 1;
  max-width: 680px;
  margin: 0 auto;
  padding: 32px 24px 48px;
}

.header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 32px;
}

.btn-back {
  width: 42px; height: 42px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50%;
  color: rgba(255,255,255,0.7);
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
  flex-shrink: 0;
}

.btn-back:hover {
  background: rgba(255,255,255,0.15);
  color: #fff;
  transform: translateX(-2px);
}

.header-info { flex: 1; }

.header-title {
  font-family: 'Syne', sans-serif;
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.header-sub {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 4px;
}

.btn-refresh {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}

.btn-refresh:hover { background: rgba(255,255,255,0.1); color: var(--text); }
.btn-refresh.spinning { animation: spin 1s linear infinite; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

/* Filters */
.filters {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}

.filter-btn {
  padding: 8px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}

.filter-btn.active {
  background: rgba(232,69,69,0.1);
  border-color: rgba(232,69,69,0.4);
  color: var(--accent);
}

/* Lobby list */
.lobby-list { display: flex; flex-direction: column; gap: 10px; }

.lobby-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: border-color 0.2s;
  animation: fadeIn 0.3s ease both;
}

@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

.lobby-card:hover { border-color: rgba(232,69,69,0.3); }

.lobby-avatar {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 800;
  flex-shrink: 0;
}

.lobby-info { flex: 1; min-width: 0; }

.lobby-host {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.3px;
  margin-bottom: 6px;
}

.lobby-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.lobby-code {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  font-family: 'DM Mono', monospace;
}

.lobby-players {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
}

.lobby-badge {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 6px;
  border: 1px solid;
}

.lobby-badge.public  { color: var(--green); border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.08); }
.lobby-badge.private { color: var(--muted); border-color: var(--border); }

.lobby-slots {
  display: flex;
  gap: 4px;
  align-items: center;
}

.slot-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.2s;
}

.slot-dot.filled { background: var(--green); }

.btn-join-lobby {
  padding: 10px 20px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 12px rgba(232,69,69,0.25);
  flex-shrink: 0;
}

.btn-join-lobby:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(232,69,69,0.35);
}

/* Empty / loading states */
.state-msg {
  text-align: center;
  padding: 60px 24px;
  color: var(--muted);
  font-size: 13px;
  letter-spacing: 1px;
}

.state-msg .icon { font-size: 32px; margin-bottom: 16px; }
.state-msg .title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }

/* Auto-refresh indicator */
.refresh-bar {
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  margin-bottom: 20px;
  overflow: hidden;
}

.refresh-progress {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 1px;
  animation: progress 5s linear infinite;
}

@keyframes progress { from{width:0%} to{width:100%} }
</style>
</head>
<body>
<div class="layout">

  <div class="header">
    <button class="btn-back" id="backBtn">←</button>
    <div class="header-info">
      <div class="header-title">Open Lobbies</div>
      <div class="header-sub" id="headerSub">Fetching rooms...</div>
    </div>
    <button class="btn-refresh" id="refreshBtn">↻ Refresh</button>
  </div>

  <div class="refresh-bar"><div class="refresh-progress"></div></div>

  <div class="filters">
    <button class="filter-btn active" id="filterAll"    onclick="setFilter('all')">All</button>
    <button class="filter-btn"        id="filterPublic" onclick="setFilter('public')">🌐 Public</button>
    <button class="filter-btn"        id="filterOpen"   onclick="setFilter('open')">Open Slots</button>
  </div>

  <div class="lobby-list" id="lobbyList">
    <div class="state-msg">
      <div class="icon">⚔</div>
      <div class="title">Loading...</div>
    </div>
  </div>

</div>

<script>
const bridge = window.lobbiesBridge;
console.log('[Lobbies] bridge:', bridge); // ← add this
const RELAY  = 'https://mtg-duel-relay-tedy.fly.dev';

let allLobbies = [];
let currentFilter = 'all';
let refreshTimer = null;

async function fetchLobbies() {
  try {
    const res  = await fetch(`${RELAY}/lobbies`);
    const data = await res.json();
    allLobbies = data;
    renderLobbies();
    const count = data.length;
    document.getElementById('headerSub').textContent =
      count === 0 ? 'No open lobbies right now' : `${count} open ${count === 1 ? 'lobby' : 'lobbies'} found`;
  } catch (err) {
    document.getElementById('headerSub').textContent = 'Could not reach relay server';
    document.getElementById('lobbyList').innerHTML = `
      <div class="state-msg">
        <div class="icon">⚠</div>
        <div class="title">Connection Error</div>
        <div>Could not reach the relay server</div>
      </div>`;
  }
}

function setFilter(f) {
  currentFilter = f;
  ['all','public','open'].forEach(id => {
    document.getElementById(`filter${id.charAt(0).toUpperCase()+id.slice(1)}`).classList.toggle('active', id === f);
  });
  renderLobbies();
}

function renderLobbies() {
  const list = document.getElementById('lobbyList');

  let filtered = allLobbies;
  if (currentFilter === 'public') filtered = allLobbies.filter(l => l.isPublic);
  if (currentFilter === 'open')   filtered = allLobbies.filter(l => l.players < l.maxPlayers);

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="state-msg">
        <div class="icon">🃏</div>
        <div class="title">No lobbies found</div>
        <div>Create one and invite your friends!</div>
      </div>`;
    return;
  }

  list.innerHTML = filtered.map((lobby, i) => {
    const slots = Array.from({ length: lobby.maxPlayers }, (_, j) =>
      `<div class="slot-dot${j < lobby.players ? ' filled' : ''}"></div>`
    ).join('');

    return `
      <div class="lobby-card" style="animation-delay:${i * 0.05}s">
        <div class="lobby-avatar">${(lobby.hostName || '?')[0].toUpperCase()}</div>
        <div class="lobby-info">
          <div class="lobby-host">${lobby.hostName || 'Host'}'s Game</div>
          <div class="lobby-meta">
            <span class="lobby-code">${lobby.code}</span>
            <span class="lobby-players">${lobby.players}/${lobby.maxPlayers} players</span>
            <span class="lobby-badge ${lobby.isPublic ? 'public' : 'private'}">${lobby.isPublic ? '🌐 Public' : '🔒 Private'}</span>
            <div class="lobby-slots">${slots}</div>
          </div>
        </div>
        <button class="btn-join-lobby" onclick="joinLobby('${lobby.code}')">Join →</button>
      </div>
    `;
  }).join('');
}

function joinLobby(code) {
    console.log('[Lobbies] Joining lobby with code:', code);  
  bridge.joinLobby(code);
}

document.getElementById('backBtn').addEventListener('click', () => bridge.goBack());

document.getElementById('refreshBtn').addEventListener('click', () => {
  fetchLobbies();
});

// Auto refresh every 5 seconds
fetchLobbies();
refreshTimer = setInterval(fetchLobbies, 5000);
</script>
</body>
</html>
